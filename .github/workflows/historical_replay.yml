name: Historical Replay — Daily Batch

# Runs once a day at 02:00 UTC (10:00 SGT).
# Processes ONE ticker per run to stay within Gemini's 20 RPD free-tier limit.
# TICKER_INDEX advances through the 16-ticker list over 16 days.
# After all tickers are done the workflow still runs but the script exits cleanly
# (every row already exists → all skipped).
#
# Manual trigger: Actions → "Historical Replay — Daily Batch" → Run workflow
# You can override the ticker index or run a dry-run from the UI.

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC daily
  workflow_dispatch:
    inputs:
      ticker_index:
        description: "0-based ticker index (0=AAPL … 15=BA). Leave blank to use auto-advance."
        required: false
        default: ""
      dry_run:
        description: "Dry run — no Gemini calls, no DB writes (true/false)"
        required: false
        default: "false"

jobs:
  replay:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # 1 ticker × 12 months × ~(9s TD + 2s Gemini) ≈ 18 min

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      # ── 3. Resolve ticker index ───────────────────────────────────
      # Auto-advance: day-of-year mod 16 cycles through all tickers.
      # If a manual override is provided via workflow_dispatch, use that instead.
      - name: Resolve ticker index
        id: resolve_index
        run: |
          if [ -n "${{ github.event.inputs.ticker_index }}" ]; then
            INDEX="${{ github.event.inputs.ticker_index }}"
            echo "Source: manual override"
          else
            # Day of year (1-based) mod 16 = 0..15
            DOY=$(date +%j)
            INDEX=$(( (DOY - 1) % 16 ))
            echo "Source: auto-advance (day of year $DOY → index $INDEX)"
          fi
          echo "index=$INDEX" >> "$GITHUB_OUTPUT"
          echo "Ticker index: $INDEX"

      # ── 4. Run replay script ──────────────────────────────────────
      - name: Run historical replay
        env:
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          TWELVE_DATA_API_KEY:   ${{ secrets.TWELVE_DATA_API_KEY }}
          FINNHUB_API_KEY:       ${{ secrets.FINNHUB_API_KEY }}
        run: |
          cd backend

          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
            echo "Dry run mode enabled"
          fi

          python scripts/historical_replay.py \
            --ticker-index ${{ steps.resolve_index.outputs.index }} \
            $DRY_RUN_FLAG