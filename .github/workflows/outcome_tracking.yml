name: Outcome Tracking — Daily Refresh

# Runs once a day at 03:00 UTC (11:00 SGT), after the historical replay
# workflow (02:00 UTC) has had time to complete.
#
# Fetches 1d / 7d / 30d returns from Twelve Data for every recommendation
# that doesn't yet have a complete performance result, then writes to Neon.
#
# Rate limiting built into the script:
#   Twelve Data: 2 calls per recommendation (ticker + SPY), 9s delay each
#   At default --limit 100: ~30 min worst-case; timeout set to 60 min.
#
# Manual trigger: Actions → "Outcome Tracking — Daily Refresh" → Run workflow
# Use --limit override to process more/fewer rows in one run.

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      limit:
        description: "Max recommendations to process (default 100)"
        required: false
        default: "100"
      dry_run:
        description: "Dry run — calculate returns but skip DB writes (true/false)"
        required: false
        default: "false"

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      # ── 3. Run outcome tracking script ────────────────────────────
      - name: Run outcome tracking
        env:
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          TWELVE_DATA_API_KEY:   ${{ secrets.TWELVE_DATA_API_KEY }}
        run: |
          cd backend

          LIMIT="${{ github.event.inputs.limit || '100' }}"

          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
            echo "Dry run mode enabled"
          fi

          echo "Processing up to $LIMIT recommendations"

          python scripts/outcome_tracking.py \
            --limit "$LIMIT" \
            $DRY_RUN_FLAG